services:
  # The Backend Service
  - type: web
    name: oneclick-backend
    env: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: free
    healthCheckPath: /
    envVars:
      - key: PORT
        value: 5000
      - key: FRONTEND_URL
        # Update this to your actual frontend URL once deployed
        value: "https://oneclick-frontend.onrender.com" 

  # The Frontend Service (Static Site)
  - type: web
    name: oneclick-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    region: oregon
    plan: free
    envVars:
      - key: VITE_API_URL
        value: "https://oneclick-6v4g.onrender.com"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
